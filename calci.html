<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Grade Bloom · 0–100</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #fcefe6;  /* warm pastel base */
      position: relative;
      overflow-x: hidden;
    }

    /* ===== UNIQUE BACKGROUND ANIMATION ===== */
    .bg-bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.20;
      pointer-events: none;
      z-index: 0;
      animation: floatBubble 20s infinite alternate ease-in-out;
      filter: blur(3px);
    }

    .b1 { width: 300px; height: 300px; background: #ffb7b7; top: -60px; left: -80px; animation-duration: 24s; }
    .b2 { width: 360px; height: 360px; background: #fce38a; bottom: -80px; right: -90px; animation-duration: 28s; animation-delay: -5s; }
    .b3 { width: 220px; height: 220px; background: #a8e6cf; top: 25%; right: -40px; animation-duration: 22s; animation-delay: -9s; }
    .b4 { width: 420px; height: 420px; background: #d7b8f0; bottom: 5%; left: -140px; animation-duration: 32s; animation-delay: -14s; }
    .b5 { width: 200px; height: 200px; background: #f9b5b5; top: 60%; left: 75%; animation-duration: 26s; animation-delay: -3s; }
    .b6 { width: 280px; height: 280px; background: #b5d9f9; top: 8%; right: 10%; animation-duration: 30s; animation-delay: -7s; }
    .b7 { width: 160px; height: 160px; background: #f5d0b8; bottom: 30%; left: 10%; animation-duration: 18s; animation-delay: -11s; }

    @keyframes floatBubble {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      30% { transform: translate(30px, -40px) scale(1.10) rotate(7deg); }
      60% { transform: translate(-25px, 25px) scale(0.90) rotate(-6deg); }
      100% { transform: translate(20px, 30px) scale(1.05) rotate(4deg); }
    }

    /* ===== MAIN CARD ===== */
    .glass-card {
      max-width: 740px;
      width: 100%;
      padding: 2rem 2rem 1.8rem;
      border-radius: 60px;
      background: rgba(255, 245, 235, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 24px 56px rgba(160, 100, 70, 0.18), 0 0 0 1px rgba(255, 215, 185, 0.25);
      border: 1px solid rgba(255, 230, 210, 0.5);
      position: relative;
      z-index: 10;
      transition: all 0.25s ease;
      animation: cardBreath 10s infinite alternate ease-in-out;
    }

    @keyframes cardBreath {
      0% { transform: scale(1) translateY(0); box-shadow: 0 24px 56px rgba(160, 100, 70, 0.12); }
      100% { transform: scale(1.008) translateY(-5px); box-shadow: 0 34px 68px rgba(200, 130, 90, 0.25); }
    }

    h1 {
      font-size: 2.7rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #4d3525;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.1rem;
      flex-wrap: wrap;
    }

    h1 span {
      background: linear-gradient(145deg, #d4836b, #b25f4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }

    .subhead {
      color: #7f5f4b;
      font-weight: 400;
      margin-bottom: 1.8rem;
      padding-left: 14px;
      border-left: 4px solid #f3b28a;
      font-size: 0.98rem;
      opacity: 0.8;
      letter-spacing: 0.3px;
    }

    /* ===== INPUT GRID ===== */
    .input-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 1.8rem;
    }

    .subject-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      background: rgba(255, 235, 220, 0.30);
      padding: 0.2rem 0.8rem 0.2rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 215, 185, 0.4);
      transition: 0.2s;
    }

    .subject-row:hover {
      background: rgba(255, 225, 205, 0.45);
      border-color: #f7c8b0;
    }

    .subject-label {
      min-width: 85px;
      font-weight: 600;
      color: #4d3525;
      font-size: 1rem;
      letter-spacing: 0.2px;
    }

    .input-wrapper {
      flex: 1;
      min-width: 100px;
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 50px;
      border: 2px solid #fad6c0;
      background: rgba(255, 248, 240, 0.7);
      backdrop-filter: blur(2px);
      color: #2d1f14;
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: inset 0 4px 6px rgba(180, 120, 90, 0.08);
      outline: none;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .input-wrapper input:focus {
      border-color: #e3946f;
      box-shadow: 0 0 0 5px rgba(227, 148, 111, 0.2), inset 0 2px 8px rgba(140, 80, 50, 0.1);
      background: #fffaf5;
      transform: scale(1.01);
    }

    .input-wrapper input::placeholder {
      color: #b58e78;
      font-weight: 300;
      font-size: 0.75rem;
      opacity: 0.6;
    }

    .input-wrapper input:valid {
      border-color: #98c1a5;
    }

    .input-wrapper input:invalid:not(:placeholder-shown) {
      border-color: #e6857a;
    }

    /* ===== BUTTONS ===== */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin: 0.8rem 0 1.8rem;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      background: #f5d9ca;
      color: #3d2b1e;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 14px rgba(180, 110, 70, 0.15);
      flex: 1 1 auto;
      min-width: 120px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(255, 215, 185, 0.3);
    }

    .btn-primary {
      background: linear-gradient(145deg, #f7c9b0, #edb094);
      color: #2f1f14;
      box-shadow: 0 8px 18px rgba(200, 120, 80, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      background: linear-gradient(145deg, #fad6be, #f0b89a);
      box-shadow: 0 12px 28px rgba(200, 120, 80, 0.35);
    }

    .btn-secondary {
      background: rgba(240, 215, 195, 0.7);
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(235, 210, 185, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(160, 100, 70, 0.2);
    }

    /* ===== RESULT PANEL ===== */
    .result-panel {
      background: rgba(255, 240, 228, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 1.6rem 1.5rem 1.8rem;
      border: 1px solid rgba(255, 215, 185, 0.3);
      margin-top: 0.2rem;
      transition: all 0.2s ease;
      box-shadow: inset 0 0 20px rgba(200, 150, 120, 0.08);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      margin-bottom: 0.2rem;
    }

    .result-item {
      background: rgba(255, 235, 220, 0.4);
      border-radius: 30px;
      padding: 0.7rem 0.3rem;
      text-align: center;
      border: 1px solid rgba(255, 215, 185, 0.2);
      transition: 0.15s ease;
      box-shadow: 0 4px 10px rgba(140, 90, 60, 0.06);
      animation: resultPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transform: scale(0.92);
      opacity: 0;
    }

    .result-item:nth-child(1) { animation-delay: 0.05s; }
    .result-item:nth-child(2) { animation-delay: 0.12s; }
    .result-item:nth-child(3) { animation-delay: 0.19s; }
    .result-item:nth-child(4) { animation-delay: 0.26s; }

    @keyframes resultPop {
      to { transform: scale(1); opacity: 1; }
    }

    .result-item .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #7f5f4b;
      font-weight: 600;
    }

    .result-item .value {
      font-size: 2rem;
      font-weight: 700;
      color: #2d1f14;
      line-height: 1.3;
    }

    .result-item .value.pass {
      color: #2f7a5a;
    }

    .result-item .value.fail {
      color: #c45346;
    }

    .cgpa-badge {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(145deg, #d4836b, #b25f4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .footer-note {
      margin-top: 1rem;
      text-align: center;
      color: #9f7a64;
      font-size: 0.75rem;
      letter-spacing: 0.4px;
      border-top: 1px solid rgba(200, 160, 140, 0.15);
      padding-top: 0.9rem;
      opacity: 0.7;
    }

    /* shake (error) */
    .animate-shake {
      animation: shake 0.35s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @media (max-width: 550px) {
      .glass-card { padding: 1.2rem; }
      h1 { font-size: 2rem; }
      .subject-label { min-width: 70px; font-size: 0.9rem; }
      .subject-row { padding: 0.2rem 0.5rem 0.2rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- background bubbles : bright & aesthetic -->
  <div class="bg-bubble b1"></div>
  <div class="bg-bubble b2"></div>
  <div class="bg-bubble b3"></div>
  <div class="bg-bubble b4"></div>
  <div class="bg-bubble b5"></div>
  <div class="bg-bubble b6"></div>
  <div class="bg-bubble b7"></div>

  <!-- main card -->
  <div class="glass-card">
    <h1>
      🌸 <span>Grade Bloom</span>
    </h1>
    <div class="subhead">✨ 0–100 marks · subject 1–5</div>

    <!-- input fields: subject 1 to 5 -->
    <div class="input-grid" id="subjectInputs">
      <div class="subject-row">
        <span class="subject-label">📘 Subject 1</span>
        <div class="input-wrapper">
          <input type="number" id="sub1" min="0" max="100" placeholder="0–100" required>
        </div>
      </div>
      <div class="subject-row">
        <span class="subject-label">📗 Subject 2</span>
        <div class="input-wrapper">
          <input type="number" id="sub2" min="0" max="100" placeholder="0–100" required>
        </div>
      </div>
      <div class="subject-row">
        <span class="subject-label">📕 Subject 3</span>
        <div class="input-wrapper">
          <input type="number" id="sub3" min="0" max="100" placeholder="0–100" required>
        </div>
      </div>
      <div class="subject-row">
        <span class="subject-label">📙 Subject 4</span>
        <div class="input-wrapper">
          <input type="number" id="sub4" min="0" max="100" placeholder="0–100" required>
        </div>
      </div>
      <div class="subject-row">
        <span class="subject-label">📒 Subject 5</span>
        <div class="input-wrapper">
          <input type="number" id="sub5" min="0" max="100" placeholder="0–100" required>
        </div>
      </div>
    </div>

    <!-- action buttons -->
    <div class="btn-group">
      <button class="btn btn-primary" id="calculateBtn">✨ Calculate</button>
      <button class="btn btn-secondary" id="resetBtn">↻ Reset</button>
    </div>

    <!-- result panel -->
    <div class="result-panel" id="resultPanel">
      <div class="result-grid" id="resultGrid">
        <div class="result-item">
          <div class="label">📊 Total</div>
          <div class="value" id="totalValue">—</div>
        </div>
        <div class="result-item">
          <div class="label">📈 Percentage</div>
          <div class="value" id="percentValue">—%</div>
        </div>
        <div class="result-item">
          <div class="label">✅ Status</div>
          <div class="value" id="statusValue">—</div>
        </div>
        <div class="result-item">
          <div class="label">🏅 CGPA</div>
          <div class="value cgpa-badge" id="cgpaValue">—</div>
        </div>
      </div>
      <div class="footer-note">🔢 enter marks between 0 and 100 · auto calculate</div>
    </div>
  </div>

  <script>
    (function() {
      const inputIds = ['sub1', 'sub2', 'sub3', 'sub4', 'sub5'];
      const inputs = {};
      inputIds.forEach(id => { inputs[id] = document.getElementById(id); });

      const totalEl = document.getElementById('totalValue');
      const percentEl = document.getElementById('percentValue');
      const statusEl = document.getElementById('statusValue');
      const cgpaEl = document.getElementById('cgpaValue');
      const resultPanel = document.getElementById('resultPanel');
      const calcBtn = document.getElementById('calculateBtn');
      const resetBtn = document.getElementById('resetBtn');

      function getMarks() {
        const marks = [];
        let valid = true;
        for (let id of inputIds) {
          const val = inputs[id].value.trim();
          if (val === '') { valid = false; marks.push(NaN); continue; }
          const num = Number(val);
          // 0–100 inclusive, integer
          if (!Number.isInteger(num) || num < 0 || num > 100) {
            valid = false;
            marks.push(NaN);
          } else {
            marks.push(num);
          }
        }
        return { marks, valid };
      }

      function calculateAndDisplay() {
        const { marks, valid } = getMarks();
        const allFilled = marks.every(m => !isNaN(m));
        const allValid = marks.every(m => Number.isInteger(m) && m >= 0 && m <= 100);

        if (!allFilled || !allValid) {
          resultPanel.classList.add('animate-shake');
          setTimeout(() => resultPanel.classList.remove('animate-shake'), 400);
          totalEl.textContent = '!';
          percentEl.textContent = '!%';
          statusEl.textContent = '⚠️';
          statusEl.style.color = '#c45346';
          cgpaEl.textContent = '—';
          return;
        }

        const total = marks.reduce((acc, m) => acc + m, 0);
        const maxTotal = 5 * 100; // 500
        const percentage = (total / maxTotal) * 100;
        // CGPA: percentage / 9.5 (common scale, capped 10)
        const cgpa = Math.min(10, Math.max(0, percentage / 9.5));
        const cgpaFixed = cgpa.toFixed(2);

        const passed = percentage >= 40;
        const statusText = passed ? '✅ PASS' : '❌ FAIL';
        const statusColor = passed ? '#2f7a5a' : '#c45346';

        totalEl.textContent = total;
        percentEl.textContent = percentage.toFixed(2) + '%';
        statusEl.textContent = statusText;
        statusEl.style.color = statusColor;
        cgpaEl.textContent = cgpaFixed;

        // subtle glow
        totalEl.style.transition = '0.2s';
        totalEl.style.textShadow = '0 0 12px rgba(180,120,80,0.2)';
        setTimeout(() => totalEl.style.textShadow = 'none', 300);
      }

      function resetAll() {
        for (let id of inputIds) {
          inputs[id].value = '';
        }
        totalEl.textContent = '—';
        percentEl.textContent = '—%';
        statusEl.textContent = '—';
        statusEl.style.color = '#2d1f14';
        cgpaEl.textContent = '—';
        resultPanel.classList.remove('animate-shake');
      }

      // event listeners
      calcBtn.addEventListener('click', calculateAndDisplay);

      resetBtn.addEventListener('click', resetAll);

      // enter key on any input
      for (let id of inputIds) {
        inputs[id].addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            calculateAndDisplay();
          }
        });
      }

      // visual: limit to 3 digits (max 100) + style
      for (let id of inputIds) {
        inputs[id].addEventListener('input', function(e) {
          let val = this.value;
          if (val.startsWith('-')) val = val.substring(1);
          // allow up to 3 digits (for 100)
          if (val.length > 3) {
            this.value = val.slice(0, 3);
          }
          const num = Number(this.value);
          if (this.value !== '' && (num < 0 || num > 100)) {
            this.style.borderColor = '#e6857a';
          } else {
            this.style.borderColor = '#fad6c0';
          }
        });
      }

      resetAll();
    })();
  </script>
</body>
</html>
